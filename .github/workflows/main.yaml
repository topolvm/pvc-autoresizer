name: "Main"
on:
  pull_request:
  push:
    branches:
      - "main"
jobs:
  build:
    name: "build"
    runs-on: "ubuntu-22.04"
    steps:
      - uses: actions/checkout@v6
      - name: "Set up QEMU"
        uses: docker/setup-qemu-action@v3
      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3
      - uses: actions/setup-go@v6
        with:
          # TODO: revert to go-version-file: go.mod once setup-go resolves the 1.24.0 selection issue.
          go-version: "1.25.x"
          check-latest: true
      - run: make setup
      - run: make check-uncommitted
      - run: make lint
      - run: make
      - run: make test
      - run: env NO_ANNOTATION_CHECK=true make test
      - run: make image
